<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1a14"/>
      <stop offset="100%" stop-color="#0a0a0c"/>
    </linearGradient>
    <linearGradient id="x-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" ry="7" fill="url(#bg-grad)"/>
  <!-- Subtle emerald border -->
  <rect width="32" height="32" rx="7" ry="7" fill="none" stroke="#10b981" stroke-width="0.75" opacity="0.3"/>
  <!-- X mark - two crossed strokes in emerald -->
  <line x1="9.5" y1="9.5" x2="22.5" y2="22.5" stroke="url(#x-grad)" stroke-width="3.4" stroke-linecap="round"/>
  <line x1="22.5" y1="9.5" x2="9.5" y2="22.5" stroke="url(#x-grad)" stroke-width="3.4" stroke-linecap="round"/>
  <!-- Center glow dot -->
  <circle cx="16" cy="16" r="1.8" fill="#10b981" opacity="0.4"/>
</svg>
