<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="x-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.95)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.75)"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" ry="7" fill="url(#bg-grad)"/>
  <!-- Subtle inner glow overlay -->
  <rect width="32" height="32" rx="7" ry="7" fill="white" opacity="0.06"/>
  <!-- X mark - two crossed strokes -->
  <line x1="9.5" y1="9.5" x2="22.5" y2="22.5" stroke="white" stroke-width="3.6" stroke-linecap="round" opacity="0.95"/>
  <line x1="22.5" y1="9.5" x2="9.5" y2="22.5" stroke="white" stroke-width="3.6" stroke-linecap="round" opacity="0.95"/>
  <!-- Small accent dot at center -->
  <circle cx="16" cy="16" r="2" fill="white" opacity="0.3"/>
</svg>
