name: Push to Tencent TCR

on:
  workflow_dispatch:

env:
  IMAGE_SERVER: ghcr.io/${{ github.repository_owner }}/agent-x-server
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/agent-x-web
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  push-tcr:
    name: Push latest to Tencent TCR
    runs-on: ubuntu-latest
    permissions:
      packages: read

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Tencent TCR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.TCR_REGISTRY }}
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Push server latest to TCR
        run: |
          docker buildx imagetools create \
            --tag ${{ secrets.TCR_REGISTRY }}/agent-x-server:latest \
            ${{ env.IMAGE_SERVER }}:latest

      - name: Push web latest to TCR
        run: |
          docker buildx imagetools create \
            --tag ${{ secrets.TCR_REGISTRY }}/agent-x-web:latest \
            ${{ env.IMAGE_WEB }}:latest
