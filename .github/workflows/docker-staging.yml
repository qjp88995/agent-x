name: Docker Staging

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_SERVER: ghcr.io/${{ github.repository_owner }}/agent-x-server
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/agent-x-web
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-server:
    name: Build & Push Server (staging)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_SERVER }}
          tags: |
            type=raw,value=staging

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

  build-web:
    name: Build & Push Web (staging)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_WEB }}
          tags: |
            type=raw,value=staging

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  push-tcr:
    name: Push staging to Tencent TCR
    runs-on: ubuntu-latest
    needs: [build-server, build-web]
    if: ${{ secrets.TCR_REGISTRY != '' }}
    permissions:
      packages: read

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Tencent TCR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.TCR_REGISTRY }}
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Push server staging to TCR
        run: |
          docker pull ${{ env.IMAGE_SERVER }}:staging
          docker tag ${{ env.IMAGE_SERVER }}:staging ${{ secrets.TCR_REGISTRY }}/${{ secrets.TCR_NAMESPACE }}/agent-x-server:staging
          docker push ${{ secrets.TCR_REGISTRY }}/${{ secrets.TCR_NAMESPACE }}/agent-x-server:staging

      - name: Push web staging to TCR
        run: |
          docker pull ${{ env.IMAGE_WEB }}:staging
          docker tag ${{ env.IMAGE_WEB }}:staging ${{ secrets.TCR_REGISTRY }}/${{ secrets.TCR_NAMESPACE }}/agent-x-web:staging
          docker push ${{ secrets.TCR_REGISTRY }}/${{ secrets.TCR_NAMESPACE }}/agent-x-web:staging
