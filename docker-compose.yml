services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-agent_x}
      POSTGRES_USER: ${DB_USER:-agent_x}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-agent_x}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - workspaces:/app/data/workspaces
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-agent_x}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-agent_x}
      PORT: 3000
    networks:
      - frontend
      - backend

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    depends_on:
      - server
    networks:
      - frontend

volumes:
  pgdata:
  workspaces:

networks:
  frontend:
  backend:
